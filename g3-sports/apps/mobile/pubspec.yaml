name: g3_sports_mobile
description: G3 Sports — Tournament management and live scoring
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1

  # Real-time
  socket_io_client: ^2.0.3+1

  # Navigation
  go_router: ^14.1.4

  # Storage
  flutter_secure_storage: ^9.2.2

  # UI helpers
  cached_network_image: ^3.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
